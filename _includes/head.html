<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>
    {%- if page.title -%} {{ page.title }} {%- else -%} {{ site.title }} {%-
    endif -%}
  </title>

  <!-- Primary Meta Tags -->
  <meta name="title" content="ksanbal blog" />
  <meta
    name="description"
    content="안녕하세요 👋 어제보다 더 나은 개발자가 되고싶은 김현균입니다."
  />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ksanbal.github.io/" />
  <meta property="og:title" content="ksanbal blog" />
  <meta
    property="og:description"
    content="안녕하세요 👋 어제보다 더 나은 개발자가 되고싶은 김현균입니다."
  />
  <meta property="og:image" content="/assets/img/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://ksanbal.github.io/" />
  <meta property="twitter:title" content="ksanbal blog" />
  <meta
    property="twitter:description"
    content="안녕하세요 👋 어제보다 더 나은 개발자가 되고싶은 김현균입니다."
  />
  <meta property="twitter:image" content="/assets/img/og-image.png" />

  <!-- Meta Tags Generated with https://metatags.io -->

  {%-seo title=false-%} {%-feed_meta-%}

  <link
    rel="shortcut icon"
    type="image/x-icon"
    href="{{ site.favicon | relative_url }}"
  />
  <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}" />

  <!-- Google tag (gtag.js) -->
  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-RRJ69FPLQY"
  ></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "G-RRJ69FPLQY");
  </script>

  <meta
    name="naver-site-verification"
    content="67728b3bcb3c863662919691b4bb811dd6ac6e99"
  />
</head>
